<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Painel Admin - Foto&Moda</title>

<link rel="stylesheet" href="admin.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<nav class="navbar navbar-dark bg-dark">
<div class="container">

<span class="navbar-brand">Painel Administrativo - Foto&Moda</span>

<button class="btn btn-danger" onclick="logout()">
Sair
</button>

</div>
</nav>

<div class="container mt-5">

<h2>📸 Gerenciar Portfólio</h2>

<form id="fotoForm">

<input type="text" id="titulo" placeholder="Título" class="form-control mb-2">

<textarea id="descricao" placeholder="Descrição" class="form-control mb-2"></textarea>

<input type="file" id="imagem" class="form-control mb-2">

<button class="btn btn-primary">
Enviar Foto
</button>

</form>

<hr>

<h3>Fotos cadastradas</h3>

<div id="galeria" class="row"></div>

</div>

<script src="admin.js"></script>

</body>
</html>
